<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; }
        body { background: #1a1a1a; } /* Dark grey backup */

        #cover-section {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #cover-image {
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .test-text {
            position: absolute;
            top: 20px;
            color: gold;
            font-family: sans-serif;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="test-text">STARDIAN ENGINE ACTIVE</div>

    <section id="cover-section">
        <img src="cover.png" id="cover-image">
    </section>

</body>
</html>
